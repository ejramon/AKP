<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IKA — Registra tu Club</title>
<style>
:root{--p:#1A3A6B;--pd:#0F2347;--a:#2563EB;--t:#1E293B;--ts:#64748B;--b:#CBD5E1;--f:#F0F4F8;--s:#fff;--ok:#16A34A;--err:#DC2626}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--f);color:var(--t);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--p);padding:12px 20px;display:flex;align-items:center;gap:10px;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hero{background:var(--p);color:#fff;text-align:center;padding:48px 20px 40px}
.hero-icon{font-size:3rem;margin-bottom:12px}
.hero h1{font-size:1.4rem;font-weight:800;margin-bottom:6px}
.hero p{font-size:.88rem;opacity:.7;max-width:400px;margin:0 auto}
.main{max-width:480px;margin:32px auto;padding:0 16px;width:100%}
.card{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.card-title{font-size:.72rem;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.1em;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.card-title::after{content:'';flex:1;height:1px;background:var(--b)}
.f{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.f label{font-size:.66rem;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.07em}
.f input,.f select{width:100%;padding:9px 11px;background:var(--f);border:1px solid var(--b);border-radius:8px;font-size:.86rem;color:var(--t);font-family:inherit;outline:none}
.f input:focus,.f select:focus{border-color:var(--a)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.full{grid-column:1/-1}
.sep{border:none;border-top:1px solid var(--b);margin:6px 0 14px}
.btn{width:100%;background:var(--a);color:#fff;border:none;padding:11px;border-radius:9px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.btn:hover{opacity:.9}.btn:disabled{opacity:.5;cursor:not-allowed}
#toast{position:fixed;bottom:14px;right:14px;z-index:999;display:flex;flex-direction:column;gap:7px}
.ti{padding:10px 14px;border-radius:9px;font-size:.82rem;font-weight:600;box-shadow:0 4px 14px rgba(0,0,0,.18);max-width:300px}
.tok{background:#DCFCE7;border:1px solid var(--ok);color:var(--ok)}
.terr{background:#FEE2E2;border:1px solid var(--err);color:var(--err)}
.link-box{background:var(--f);border:1px solid var(--b);border-radius:10px;padding:10px 12px;font-size:.78rem;word-break:break-all;color:var(--t);margin:10px 0 14px;text-align:center}
.btn-row{display:flex;gap:8px}
.btn-row a,.btn-row button{flex:1;padding:9px;border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;border:none;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-copy{background:var(--a);color:#fff}
.btn-wa{background:#25D366;color:#fff}
@media(max-width:480px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div style="font-size:1.4rem">🥋</div>
  <div>
    <div style="font-size:1rem;font-weight:700">IKA — Portal</div>
    <div style="font-size:.72rem;opacity:.65">International Karate Association</div>
  </div>
</header>

<div class="hero">
  <div class="hero-icon">🏫</div>
  <h1>Registra tu Club</h1>
  <p>Completa el formulario y recibirás tu link personal de acceso al portal.</p>
</div>

<div class="main">
  <!-- Formulario de registro -->
  <div class="card" id="card-form">
    <div class="card-title">📋 Datos del club</div>
    <div class="grid2">
      <div class="f full"><label>Nombre del Club *</label><input id="c-nombre" placeholder="Ej: Dojo Quito Norte"></div>
      <div class="f"><label>Ciudad</label><input id="c-ciudad" placeholder="Ej: Quito"></div>
      <div class="f"><label>Estado</label>
        <select id="c-estado"><option value="activo">Activo</option><option value="pendiente">Pendiente</option></select>
      </div>
    </div>
    <hr class="sep">
    <div class="card-title">👤 Responsable del club</div>
    <div class="grid2">
      <div class="f"><label>Nombres *</label><input id="c-nomb"></div>
      <div class="f"><label>Apellidos *</label><input id="c-apel"></div>
      <div class="f"><label>Cédula *</label><input id="c-ced" inputmode="numeric" maxlength="20"></div>
      <div class="f"><label>Contacto (Teléfono) *</label><input id="c-tel" inputmode="tel" placeholder="Ej: 0991234567"></div>
      <div class="f full"><label>Dirección *</label><input id="c-dir" placeholder="Ej: Av. Amazonas y Naciones Unidas"></div>
    </div>
    <button class="btn" id="btn-reg" onclick="registrarClub()">🏫 Registrar mi club</button>
  </div>

  <!-- Resultado con el link -->
  <div class="card" id="card-link" style="display:none;text-align:center">
    <div style="font-size:2.5rem;margin-bottom:10px">✅</div>
    <div style="font-size:1rem;font-weight:700;color:var(--p);margin-bottom:4px" id="res-nombre">—</div>
    <div style="font-size:.8rem;color:var(--ts);margin-bottom:16px">Tu club fue registrado. Guardá este link — es tu acceso personal al portal:</div>
    <div class="link-box" id="res-link">—</div>
    <div class="btn-row">
      <button class="btn-copy" onclick="copiarLink()">📋 Copiar link</button>
      <a id="btn-wa" class="btn-wa" href="#" target="_blank">📲 WhatsApp</a>
    </div>
    <div style="margin-top:16px">
      <a id="btn-ir" href="#" style="color:var(--a);font-size:.83rem;font-weight:600;text-decoration:none">Ir a mi portal →</a>
    </div>
  </div>
</div>

<div id="toast"></div>
<script>
const g=id=>document.getElementById(id);
const v=id=>g(id)?.value?.trim()||'';
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
let LINK_GENERADO='';

function toast(msg,tipo,ms=4000){
  const d=document.createElement('div');d.className=`ti t${tipo}`;d.textContent=msg;
  g('toast').appendChild(d);setTimeout(()=>d.remove(),ms);
}

async function registrarClub(){
  if(!v('c-nombre')||!v('c-nomb')||!v('c-apel')||!v('c-ced')||!v('c-tel')||!v('c-dir')){
    toast('⚠️ Completa los campos obligatorios.','err'); return;
  }
  const btn=g('btn-reg'); btn.disabled=true; btn.textContent='Registrando...';
  try{
    const r=await fetch('/api/clubs',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({nombre:v('c-nombre'),ciudad:v('c-ciudad'),estado:v('c-estado'),
        nombres_dueno:v('c-nomb'),apellidos_dueno:v('c-apel'),cedula_dueno:v('c-ced'),telefono:v('c-tel'),direccion:v('c-dir')})});
    const res=await r.json();
    if(r.ok){
      LINK_GENERADO=`${location.origin}/panel?club=${res.token}`;
      const waMsg=encodeURIComponent(`🥋 Hola! Aquí está tu link de acceso al portal IKA:\n${LINK_GENERADO}`);
      g('res-nombre').textContent=v('c-nombre');
      g('res-link').textContent=LINK_GENERADO;
      g('btn-wa').href=`https://wa.me/?text=${waMsg}`;
      g('btn-ir').href=LINK_GENERADO;
      g('card-form').style.display='none';
      g('card-link').style.display='block';
    } else toast(`❌ ${res.error}`,'err');
  }catch(e){ toast('❌ Error de conexión.','err'); }
  finally{ btn.disabled=false; btn.textContent='🏫 Registrar mi club'; }
}

function copiarLink(){
  navigator.clipboard.writeText(LINK_GENERADO)
    .then(()=>toast('✅ Link copiado','ok'))
    .catch(()=>toast('❌ No se pudo copiar','err'));
}
</script>
</body>
</html>
